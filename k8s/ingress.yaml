apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud1c-front-ingress
  namespace: dev-cloud1c
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - cloud1c-front.dev-projects.goodwin.website
    secretName: cloud1c-front-tls-secret
  rules:
  - host: cloud1c-front.dev-projects.goodwin.website
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloud1c-front-svc
            port:
              number: 80
---
