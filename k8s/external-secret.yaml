apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: docker-registry-creds
  namespace: dev-cloud1c
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-cluster-backend
    kind: ClusterSecretStore
  target:
    name: registry-pull-secret
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "registry.goodwin.website": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
        htpasswd: "{{ .htpasswd }}"
  data:
  - secretKey: username
    remoteRef:
      key: shared-services/registry
      property: username
  - secretKey: password
    remoteRef:
      key: shared-services/registry
      property: password
  - secretKey: htpasswd
    remoteRef:
      key: shared-services/registry
      property: htpasswd